<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color:#3258a8;">
<nav>
    <a href="ViewExpenseServlet">Dashboard</a>
    <a href="add-expense.html">Add Expense</a>
    <a href="add-income.html">Add Income</a>
    <a href="about.html">About</a>
</nav>
<div class="container">
    <h2>Add New Expense</h2>
    <form action="AddExpenseServlet" method="POST">
        <div class="form-group">
            <label>Serial Number sno</label>
            <input type="number" name="sno" required placeholder="example 1">
        </div>
        <div class="form-group">
            <label>Item Name</label>
            <input type="text" name="item" required placeholder="example silicon">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select name="category" required>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Studies">Studies</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
                <option value="Bills">Bills</option>
                <option value="Electronic-items">Electronic-items</option>
            </select>
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="exp_date" required>
        </div>
        <div class="form-group">
            <label>Price (Rs)</label>
            <input type="number" step="0.01" name="price" required placeholder="0.00">
        </div>
        <button type="submit">Save Expense</button>
    </form>
</div>
</body>
</html>
